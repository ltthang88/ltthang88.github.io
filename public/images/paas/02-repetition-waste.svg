<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="720" height="360" fill="#f8fafc" rx="10"/>
  <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Lãng phí ẩn: mỗi project dựng lại cùng một thứ</text>

  <!-- LEFT: every project rebuilds -->
  <rect x="20" y="44" width="400" height="296" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.5" rx="8"/>
  <text x="220" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">❌ Mỗi project tự dựng lại</text>

  <!-- 6 project cards each repeating same blocks -->
  <g>
    <!-- card template repeated -->
    <!-- row1 -->
    <rect x="36" y="78" width="122" height="78" fill="#fff" stroke="#fca5a5" rx="5"/>
    <text x="97" y="93" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b">Project 1</text>
    <rect x="44" y="100" width="48" height="16" fill="#fee2e2" rx="2"/><text x="68" y="112" text-anchor="middle" font-size="6.5" fill="#b91c1c">pipeline</text>
    <rect x="100" y="100" width="50" height="16" fill="#fee2e2" rx="2"/><text x="125" y="112" text-anchor="middle" font-size="6.5" fill="#b91c1c">logging</text>
    <rect x="44" y="120" width="48" height="16" fill="#fee2e2" rx="2"/><text x="68" y="132" text-anchor="middle" font-size="6.5" fill="#b91c1c">secrets</text>
    <rect x="100" y="120" width="50" height="16" fill="#fee2e2" rx="2"/><text x="125" y="132" text-anchor="middle" font-size="6.5" fill="#b91c1c">monitor</text>
    <rect x="44" y="140" width="106" height="12" fill="#fecaca" rx="2"/><text x="97" y="149" text-anchor="middle" font-size="6.5" fill="#991b1b">2 tuần</text>

    <rect x="168" y="78" width="122" height="78" fill="#fff" stroke="#fca5a5" rx="5"/>
    <text x="229" y="93" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b">Project 2</text>
    <rect x="176" y="100" width="48" height="16" fill="#fee2e2" rx="2"/><text x="200" y="112" text-anchor="middle" font-size="6.5" fill="#b91c1c">pipeline</text>
    <rect x="232" y="100" width="50" height="16" fill="#fee2e2" rx="2"/><text x="257" y="112" text-anchor="middle" font-size="6.5" fill="#b91c1c">logging</text>
    <rect x="176" y="120" width="48" height="16" fill="#fee2e2" rx="2"/><text x="200" y="132" text-anchor="middle" font-size="6.5" fill="#b91c1c">secrets</text>
    <rect x="232" y="120" width="50" height="16" fill="#fee2e2" rx="2"/><text x="257" y="132" text-anchor="middle" font-size="6.5" fill="#b91c1c">monitor</text>
    <rect x="176" y="140" width="106" height="12" fill="#fecaca" rx="2"/><text x="229" y="149" text-anchor="middle" font-size="6.5" fill="#991b1b">2 tuần</text>

    <rect x="300" y="78" width="104" height="78" fill="#fff" stroke="#fca5a5" rx="5"/>
    <text x="352" y="93" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b">Project 3</text>
    <rect x="308" y="100" width="42" height="16" fill="#fee2e2" rx="2"/><text x="329" y="112" text-anchor="middle" font-size="6.5" fill="#b91c1c">pipeline</text>
    <rect x="356" y="100" width="42" height="16" fill="#fee2e2" rx="2"/><text x="377" y="112" text-anchor="middle" font-size="6.5" fill="#b91c1c">logging</text>
    <rect x="308" y="120" width="42" height="16" fill="#fee2e2" rx="2"/><text x="329" y="132" text-anchor="middle" font-size="6.5" fill="#b91c1c">secrets</text>
    <rect x="356" y="120" width="42" height="16" fill="#fee2e2" rx="2"/><text x="377" y="132" text-anchor="middle" font-size="6.5" fill="#b91c1c">monitor</text>
    <rect x="308" y="140" width="90" height="12" fill="#fecaca" rx="2"/><text x="352" y="149" text-anchor="middle" font-size="6.5" fill="#991b1b">2 tuần</text>
  </g>
  <text x="220" y="178" text-anchor="middle" font-size="10" fill="#b91c1c">… × 10 project, mỗi project ~2 tuần dựng hệ vận hành giống nhau</text>

  <rect x="36" y="190" width="368" height="60" fill="#fee2e2" stroke="#fca5a5" rx="6"/>
  <text x="120" y="216" font-size="26" font-weight="800" fill="#dc2626">20 tuần</text>
  <text x="120" y="236" font-size="9.5" fill="#991b1b">-người bốc hơi vào "đường ống"</text>
  <text x="300" y="216" text-anchor="middle" font-size="9" fill="#991b1b">đáng lẽ để ship</text>
  <text x="300" y="230" text-anchor="middle" font-size="9" fill="#991b1b">tính năng cho</text>
  <text x="300" y="244" text-anchor="middle" font-size="9" fill="#991b1b">khách hàng</text>

  <text x="220" y="278" text-anchor="middle" font-size="9" fill="#94a3b8">logging mỗi nơi một kiểu · monitoring trôi dạt · tài liệu phân mảnh</text>
  <text x="220" y="312" text-anchor="middle" font-size="10" font-style="italic" fill="#b91c1c">"Không task lẻ nào đắt —</text>
  <text x="220" y="328" text-anchor="middle" font-size="10" font-style="italic" fill="#b91c1c">chi phí lộ ra khi lặp lại nhân quy mô"</text>

  <!-- RIGHT: build once reuse many -->
  <rect x="440" y="44" width="260" height="296" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="8"/>
  <text x="570" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">✅ Xây 1 lần · dùng nhiều lần</text>

  <rect x="470" y="84" width="200" height="46" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="6"/>
  <text x="570" y="104" text-anchor="middle" font-size="10.5" font-weight="700" fill="#15803d">Platform / golden path</text>
  <text x="570" y="120" text-anchor="middle" font-size="8.5" fill="#166534">dựng pipeline·log·secret·monitor 1 lần</text>

  <!-- arrows down to projects -->
  <line x1="510" y1="130" x2="510" y2="156" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="570" y1="130" x2="570" y2="156" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="630" y1="130" x2="630" y2="156" stroke="#16a34a" stroke-width="1.5"/>

  <rect x="470" y="158" width="60" height="40" fill="#fff" stroke="#86efac" rx="4"/>
  <text x="500" y="182" text-anchor="middle" font-size="8.5" fill="#166534">Proj 1</text>
  <rect x="540" y="158" width="60" height="40" fill="#fff" stroke="#86efac" rx="4"/>
  <text x="570" y="182" text-anchor="middle" font-size="8.5" fill="#166534">Proj 2</text>
  <rect x="610" y="158" width="60" height="40" fill="#fff" stroke="#86efac" rx="4"/>
  <text x="640" y="182" text-anchor="middle" font-size="8.5" fill="#166534">Proj 3…</text>

  <rect x="470" y="214" width="200" height="58" fill="#dcfce7" stroke="#86efac" rx="6"/>
  <text x="570" y="238" text-anchor="middle" font-size="10" fill="#166534">Mỗi project bắt đầu từ</text>
  <text x="570" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">tính năng, không phải hạ tầng</text>

  <rect x="470" y="286" width="200" height="40" fill="#16a34a" rx="6"/>
  <text x="570" y="304" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">Tái sử dụng = lẽ thường</text>
  <text x="570" y="319" text-anchor="middle" font-size="8.5" fill="#dcfce7">như không ai viết lại thuật toán sort</text>
</svg>
