<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <rect width="720" height="380" fill="#f8fafc" rx="10"/>
  <text x="360" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Pod kẹt ở Pending — 6 failure mode chuyên gia nhận ra trong vài giây</text>

  <!-- central pod -->
  <rect x="280" y="52" width="160" height="44" fill="#fef9c3" stroke="#d97706" stroke-width="2" rx="8"/>
  <text x="360" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Pod: Pending</text>
  <text x="360" y="88" text-anchor="middle" font-size="9" fill="#b45309">kubectl describe pod →</text>

  <!-- 6 cause boxes -->
  <g font-size="9.5">
    <rect x="30" y="130" width="200" height="54" fill="#fff" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
    <text x="42" y="150" font-size="10.5" font-weight="700" fill="#991b1b">1 · Thiếu tài nguyên</text>
    <text x="42" y="168" fill="#64748b" font-family="monospace" font-size="8.5">Insufficient cpu/memory</text>

    <rect x="260" y="130" width="200" height="54" fill="#fff" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
    <text x="272" y="150" font-size="10.5" font-weight="700" fill="#991b1b">2 · Node selector sai</text>
    <text x="272" y="168" fill="#64748b" font-family="monospace" font-size="8.5">label không tồn tại</text>

    <rect x="490" y="130" width="200" height="54" fill="#fff" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
    <text x="502" y="150" font-size="10.5" font-weight="700" fill="#991b1b">3 · Image pull fail</text>
    <text x="502" y="168" fill="#64748b" font-family="monospace" font-size="8.5">ErrImagePull (âm thầm)</text>

    <rect x="30" y="200" width="200" height="54" fill="#fff" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
    <text x="42" y="220" font-size="10.5" font-weight="700" fill="#991b1b">4 · PVC chờ storage</text>
    <text x="42" y="238" fill="#64748b" font-family="monospace" font-size="8.5">WaitForFirstConsumer</text>

    <rect x="260" y="200" width="200" height="54" fill="#fff" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
    <text x="272" y="220" font-size="10.5" font-weight="700" fill="#991b1b">5 · Security policy chặn</text>
    <text x="272" y="238" fill="#64748b" font-family="monospace" font-size="8.5">PSA / admission denied</text>

    <rect x="490" y="200" width="200" height="54" fill="#fff" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
    <text x="502" y="220" font-size="10.5" font-weight="700" fill="#991b1b">6 · Taint không khớp</text>
    <text x="502" y="238" fill="#64748b" font-family="monospace" font-size="8.5">thiếu toleration</text>
  </g>

  <!-- connectors -->
  <g stroke="#cbd5e1" stroke-width="1.5">
    <line x1="320" y1="96" x2="130" y2="130"/>
    <line x1="350" y1="96" x2="360" y2="130"/>
    <line x1="400" y1="96" x2="590" y2="130"/>
    <line x1="320" y1="96" x2="130" y2="200"/>
    <line x1="350" y1="96" x2="360" y2="200"/>
    <line x1="400" y1="96" x2="590" y2="200"/>
  </g>

  <!-- key insight -->
  <rect x="30" y="284" width="660" height="74" fill="#1e293b" rx="8"/>
  <text x="360" y="308" text-anchor="middle" font-size="11" fill="#e2e8f0">Người trung bình xóa pod tạo lại → vẫn Pending. Chuyên gia đọc dòng Events:</text>
  <text x="360" y="328" text-anchor="middle" font-size="10.5" font-family="monospace" fill="#7ee787">0/3 nodes are available: 3 Insufficient memory</text>
  <text x="360" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Cùng một lệnh — khác nhau ở chỗ biết phải đọc gì.</text>
</svg>
