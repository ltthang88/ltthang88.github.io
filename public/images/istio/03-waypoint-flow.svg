<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="b1" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5z" fill="#374151"/></marker>
    <marker id="b2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5z" fill="#7c3aed"/></marker>
    <marker id="b3" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5z" fill="#22c55e"/></marker>
  </defs>

  <rect width="720" height="340" fill="#f8fafc" rx="10"/>
  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Waypoint Proxy — L7 Traffic Flow</text>

  <!-- Without Waypoint row -->
  <text x="20" y="60" font-size="11" font-weight="700" fill="#15803d">Không có Waypoint (L4 only)</text>

  <!-- Pod A -->
  <rect x="20" y="68" width="80" height="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="60" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Pod A</text>
  <text x="60" y="101" text-anchor="middle" font-size="8" fill="#3b82f6">source</text>

  <line x1="100" y1="90" x2="150" y2="90" stroke="#374151" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Ztunnel 1 simple -->
  <rect x="152" y="68" width="100" height="44" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="202" y="87" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Ztunnel ①</text>
  <text x="202" y="100" text-anchor="middle" font-size="8" fill="#166534">L4 · mTLS</text>

  <!-- HBONE direct -->
  <line x1="252" y1="90" x2="386" y2="90" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#b2)"/>
  <text x="320" y="83" text-anchor="middle" font-size="8" font-weight="600" fill="#7c3aed">HBONE tunnel</text>

  <!-- Ztunnel 2 simple -->
  <rect x="388" y="68" width="100" height="44" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="438" y="87" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Ztunnel ②</text>
  <text x="438" y="100" text-anchor="middle" font-size="8" fill="#166534">L4 · deliver</text>

  <line x1="488" y1="90" x2="540" y2="90" stroke="#374151" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Pod B -->
  <rect x="542" y="68" width="80" height="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="582" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Pod C</text>
  <text x="582" y="101" text-anchor="middle" font-size="8" fill="#3b82f6">destination</text>

  <text x="660" y="78" font-size="9" fill="#6b7280">✗ HTTP routing</text>
  <text x="660" y="92" font-size="9" fill="#6b7280">✗ Retries</text>
  <text x="660" y="106" font-size="9" fill="#6b7280">✗ Canary</text>

  <!-- Divider -->
  <line x1="20" y1="135" x2="700" y2="135" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- WITH Waypoint row -->
  <text x="20" y="158" font-size="11" font-weight="700" fill="#5b21b6">Có Waypoint (L7 enabled)</text>

  <!-- label: namespace có label istio.io/dataplane-mode=ambient -->
  <rect x="20" y="165" width="692" height="130" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1" rx="6" stroke-dasharray="5,3"/>
  <text x="36" y="180" font-size="9" fill="#7c3aed">namespace: label istio.io/use-waypoint=waypoint</text>

  <!-- Pod A2 -->
  <rect x="30" y="188" width="80" height="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="70" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Pod A</text>
  <text x="70" y="221" text-anchor="middle" font-size="8" fill="#3b82f6">source</text>

  <line x1="110" y1="210" x2="148" y2="210" stroke="#374151" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Ztunnel 1 -->
  <rect x="150" y="188" width="100" height="44" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="200" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Ztunnel ①</text>
  <text x="200" y="220" text-anchor="middle" font-size="8" fill="#166534">knows: route→waypoint</text>

  <!-- HBONE to Waypoint -->
  <line x1="250" y1="210" x2="296" y2="210" stroke="#7c3aed" stroke-width="2" marker-end="url(#b2)"/>
  <text x="274" y="204" text-anchor="middle" font-size="7" fill="#7c3aed">HBONE</text>

  <!-- Waypoint box -->
  <rect x="298" y="182" width="124" height="56" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="7"/>
  <text x="360" y="202" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Waypoint Proxy</text>
  <text x="360" y="216" text-anchor="middle" font-size="8" fill="#6d28d9">Envoy (C++) · L7</text>
  <text x="360" y="228" text-anchor="middle" font-size="8" fill="#6d28d9">retries · routing · canary</text>

  <!-- Waypoint features -->
  <text x="360" y="252" text-anchor="middle" font-size="8" fill="#7c3aed">circuit break · rate limit · fault inject</text>

  <!-- HBONE from Waypoint -->
  <line x1="422" y1="210" x2="468" y2="210" stroke="#7c3aed" stroke-width="2" marker-end="url(#b2)"/>
  <text x="446" y="204" text-anchor="middle" font-size="7" fill="#7c3aed">HBONE</text>

  <!-- Ztunnel 2 -->
  <rect x="470" y="188" width="100" height="44" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="520" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Ztunnel ②</text>
  <text x="520" y="220" text-anchor="middle" font-size="8" fill="#166534">deliver to pod</text>

  <line x1="570" y1="210" x2="608" y2="210" stroke="#374151" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Pod C2 -->
  <rect x="610" y="188" width="80" height="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="650" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Pod C</text>
  <text x="650" y="221" text-anchor="middle" font-size="8" fill="#3b82f6">destination</text>

  <!-- Notes -->
  <rect x="20" y="300" width="680" height="30" fill="#fff7ed" stroke="#fed7aa" stroke-width="1" rx="5"/>
  <text x="360" y="319" text-anchor="middle" font-size="10" fill="#9a3412">💡 Waypoint hoạt động trên nền Ztunnel — không deploy riêng được. Ztunnel lo tunnel bảo mật, Waypoint lo logic L7 bên trong tunnel đó.</text>
</svg>
