<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#d97706"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#7c3aed"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#94a3b8"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#dc2626"/></marker>
  </defs>

  <!-- bg -->
  <rect width="720" height="430" fill="#f8fafc" rx="10"/>

  <!-- title -->
  <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Istio Ambient Mesh — Architecture Overview</text>

  <!-- cluster border -->
  <rect x="14" y="42" width="692" height="372" fill="none" stroke="#cbd5e1" stroke-width="1.5" rx="8" stroke-dasharray="6,3"/>
  <text x="30" y="58" font-size="10" fill="#94a3b8" font-weight="600">Kubernetes Cluster</text>

  <!-- ───── ISTIOD ───── -->
  <rect x="270" y="64" width="180" height="58" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="7"/>
  <text x="360" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Istiod</text>
  <text x="360" y="108" text-anchor="middle" font-size="10" fill="#b45309">Control Plane · xDS push</text>

  <!-- xDS arrow to Node1 ztunnel -->
  <line x1="300" y1="122" x2="188" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)"/>
  <text x="218" y="200" text-anchor="middle" font-size="9" fill="#d97706" font-weight="600" transform="rotate(-33,218,200)">xDS</text>

  <!-- xDS arrow to Node2 ztunnel -->
  <line x1="420" y1="122" x2="532" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)"/>
  <text x="495" y="200" text-anchor="middle" font-size="9" fill="#d97706" font-weight="600" transform="rotate(33,495,200)">xDS</text>

  <!-- ───── NODE 1 ───── -->
  <rect x="24" y="142" width="296" height="220" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" rx="8" stroke-dasharray="5,3"/>
  <text x="172" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Node 1</text>

  <!-- Pod A -->
  <rect x="44" y="170" width="96" height="52" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="92" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Pod A</text>
  <text x="92" y="211" text-anchor="middle" font-size="9" fill="#3b82f6">app service</text>

  <!-- Pod B -->
  <rect x="160" y="170" width="96" height="52" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="208" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Pod B</text>
  <text x="208" y="211" text-anchor="middle" font-size="9" fill="#3b82f6">app service</text>

  <!-- iptables arrows pods → ztunnel -->
  <line x1="92" y1="222" x2="148" y2="265" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <line x1="208" y1="222" x2="188" y2="265" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <text x="98" y="253" font-size="8" fill="#94a3b8">iptables</text>

  <!-- Ztunnel Node1 -->
  <rect x="64" y="268" width="216" height="68" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="7"/>
  <text x="172" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Ztunnel</text>
  <text x="172" y="311" text-anchor="middle" font-size="9" fill="#166534">DaemonSet · L3/L4 mTLS · HBONE</text>
  <text x="172" y="325" text-anchor="middle" font-size="9" fill="#166534">Rust-based · ~0.06 vCPU / 12 MB</text>

  <!-- ───── NODE 2 ───── -->
  <rect x="400" y="142" width="296" height="220" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" rx="8" stroke-dasharray="5,3"/>
  <text x="548" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Node 2</text>

  <!-- Pod C -->
  <rect x="420" y="170" width="96" height="52" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="468" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Pod C</text>
  <text x="468" y="211" text-anchor="middle" font-size="9" fill="#3b82f6">app service</text>

  <!-- Pod D -->
  <rect x="536" y="170" width="96" height="52" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="584" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Pod D</text>
  <text x="584" y="211" text-anchor="middle" font-size="9" fill="#3b82f6">app service</text>

  <!-- iptables arrows -->
  <line x1="468" y1="222" x2="512" y2="265" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <line x1="584" y1="222" x2="548" y2="265" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>

  <!-- Ztunnel Node2 -->
  <rect x="440" y="268" width="216" height="68" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="7"/>
  <text x="548" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Ztunnel</text>
  <text x="548" y="311" text-anchor="middle" font-size="9" fill="#166534">DaemonSet · L3/L4 mTLS · HBONE</text>
  <text x="548" y="325" text-anchor="middle" font-size="9" fill="#166534">Rust-based · ~0.06 vCPU / 12 MB</text>

  <!-- ───── HBONE tunnel ───── -->
  <!-- arrow ztunnel1 → waypoint -->
  <line x1="280" y1="302" x2="330" y2="302" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#a2)"/>
  <!-- Waypoint (optional) -->
  <rect x="328" y="280" width="64" height="44" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" rx="6"/>
  <text x="360" y="299" text-anchor="middle" font-size="9" font-weight="700" fill="#5b21b6">Waypoint</text>
  <text x="360" y="314" text-anchor="middle" font-size="8" fill="#6d28d9">L7 optional</text>
  <!-- arrow waypoint → ztunnel2 -->
  <line x1="392" y1="302" x2="440" y2="302" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#a2)"/>

  <!-- HBONE label -->
  <text x="296" y="295" font-size="8" font-weight="600" fill="#7c3aed">HBONE</text>
  <text x="407" y="295" font-size="8" font-weight="600" fill="#7c3aed">HBONE</text>

  <!-- ───── External Gateway ───── -->
  <!-- Internet -->
  <rect x="270" y="375" width="80" height="34" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
  <text x="310" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Internet</text>

  <!-- Gateway -->
  <rect x="370" y="375" width="110" height="34" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5" rx="6"/>
  <text x="425" y="392" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412">Istio Gateway</text>
  <text x="425" y="404" text-anchor="middle" font-size="8" fill="#c2410c">North/South traffic</text>

  <line x1="350" y1="392" x2="370" y2="392" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="480" y1="375" x2="505" y2="340" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a4)"/>
</svg>
