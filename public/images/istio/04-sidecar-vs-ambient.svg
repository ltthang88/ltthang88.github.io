  <rect x="36" y="90" width="298" height="140" fill="#fff" stroke="#fca5a5" stroke-width="1" rx="6"/>
  <text x="185" y="107" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">1 Node · many pods</text>

