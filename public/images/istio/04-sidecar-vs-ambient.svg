  <text x="133" y="175" text-anchor="middle" font-size="7" fill="#dc2626">+Envoy</text>

  <rect x="168" y="153" width="50" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" rx="3"/>
  <text x="193" y="165" text-anchor="middle" font-size="7" fill="#991b1b">App</text>
  <text x="193" y="175" text-anchor="middle" font-size="7" fill="#dc2626">+Envoy</text>

  <rect x="228" y="153" width="50" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" rx="3"/>
  <text x="253" y="165" text-anchor="middle" font-size="7" fill="#991b1b">App</text>
  <text x="253" y="175" text-anchor="middle" font-size="7" fill="#dc2626">+Envoy</text>

  <text x="185" y="210" text-anchor="middle" font-size="9" fill="#94a3b8">×100 pods per node × 100 nodes = 10,000 proxies</text>
