  <rect x="398" y="153" width="50" height="30" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" rx="3"/>
  <text x="423" y="172" text-anchor="middle" font-size="8" fill="#1d4ed8">App</text>

  <rect x="458" y="153" width="50" height="30" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" rx="3"/>
  <text x="483" y="172" text-anchor="middle" font-size="8" fill="#1d4ed8">App</text>

  <rect x="518" y="153" width="50" height="30" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" rx="3"/>
  <text x="543" y="172" text-anchor="middle" font-size="8" fill="#1d4ed8">App</text>

  <rect x="578" y="153" width="50" height="30" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" rx="3"/>
  <text x="603" y="172" text-anchor="middle" font-size="8" fill="#1d4ed8">App</text>

