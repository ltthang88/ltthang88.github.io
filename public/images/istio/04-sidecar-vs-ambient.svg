  <text x="193" y="135" text-anchor="middle" font-size="7" fill="#dc2626">+Envoy</text>

  <rect x="228" y="113" width="50" height="30" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" rx="3"/>
  <text x="253" y="125" text-anchor="middle" font-size="7" fill="#991b1b">App</text>
  <text x="253" y="135" text-anchor="middle" font-size="7" fill="#dc2626">+Envoy</text>

