<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5z" fill="#16a34a"/></marker>
  </defs>
  <rect width="720" height="380" fill="#f8fafc" rx="10"/>
  <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Blue-green ở quy mô lớn: tầng mạng lật được, state dùng chung thì không</text>

  <!-- Load balancer / traffic switch -->
  <rect x="285" y="50" width="150" height="40" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" rx="6"/>
  <text x="360" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">Service / Ingress</text>
  <text x="360" y="83" text-anchor="middle" font-size="9" fill="#4338ca">lật traffic ở đây</text>

  <!-- BLUE (live) -->
  <rect x="40" y="120" width="290" height="110" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="185" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">BLUE — đang live (v1)</text>
  <rect x="60" y="155" width="80" height="30" fill="#fff" stroke="#93c5fd" rx="4"/><text x="100" y="174" text-anchor="middle" font-size="9" fill="#1e40af">pod</text>
  <rect x="150" y="155" width="80" height="30" fill="#fff" stroke="#93c5fd" rx="4"/><text x="190" y="174" text-anchor="middle" font-size="9" fill="#1e40af">pod</text>
  <rect x="240" y="155" width="70" height="30" fill="#fff" stroke="#93c5fd" rx="4"/><text x="275" y="174" text-anchor="middle" font-size="9" fill="#1e40af">pod</text>
  <text x="185" y="212" text-anchor="middle" font-size="9" fill="#1e40af">stateless · lật được</text>

  <!-- GREEN (idle) -->
  <rect x="390" y="120" width="290" height="110" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8"/>
  <text x="535" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">GREEN — chờ (v2)</text>
  <rect x="410" y="155" width="80" height="30" fill="#fff" stroke="#86efac" rx="4"/><text x="450" y="174" text-anchor="middle" font-size="9" fill="#166534">pod</text>
  <rect x="500" y="155" width="80" height="30" fill="#fff" stroke="#86efac" rx="4"/><text x="540" y="174" text-anchor="middle" font-size="9" fill="#166534">pod</text>
  <rect x="590" y="155" width="70" height="30" fill="#fff" stroke="#86efac" rx="4"/><text x="625" y="174" text-anchor="middle" font-size="9" fill="#166534">pod</text>
  <text x="535" y="212" text-anchor="middle" font-size="9" fill="#166534">stateless · lật được</text>

  <!-- arrows from LB to both -->
  <line x1="320" y1="90" x2="200" y2="118" stroke="#4f46e5" stroke-width="1.5"/>
  <line x1="400" y1="90" x2="520" y2="118" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- shared stateful backend -->
  <rect x="150" y="270" width="420" height="62" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="8"/>
  <text x="360" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Database · Redis · Message Queue — DÙNG CHUNG</text>
  <text x="360" y="312" text-anchor="middle" font-size="9.5" fill="#b91c1c">KHÔNG lật theo traffic — schema phải tương thích ngược cả v1 và v2</text>
  <text x="360" y="326" text-anchor="middle" font-size="9.5" fill="#b91c1c">rollback không tương thích ngược → biến thành bài tập khôi phục dữ liệu</text>

  <!-- both envs talk to shared backend -->
  <line x1="185" y1="230" x2="280" y2="268" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="535" y1="230" x2="440" y2="268" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
